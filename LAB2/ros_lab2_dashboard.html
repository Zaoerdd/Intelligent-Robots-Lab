int main(int argc, char **argv) {

}

cat << 'EOF' > lab2_task/scripts/turtle_command_server.py
#!/usr/bin/env python
import rospy, random, math; from turtlesim.srv import Spawn; from geometry_msgs.msg import Twist
from lab2_task.srv import TurtleCreate, TurtleCreateResponse, TurtleCommand, TurtleCommandResponse
turtles = {}; existing_coords = [(5.54, 5.54)]
def get_non_overlapping_pos():
    for _ in range(100):
        x, y = random.uniform(2.0, 9.0), random.uniform(2.0, 9.0)
        if all(math.sqrt((x-ex)**2 + (y-ey)**2) >= 1.5 for ex, ey in existing_coords):
            existing_coords.append((x, y)); return x, y
    return 2.0, 2.0
def handle_create(req):
    rospy.wait_for_service('/spawn')
    try:
        x, y = get_non_overlapping_pos(); rospy.ServiceProxy('/spawn', Spawn)(x, y, random.uniform(0, 3.14), req.name)
        turtles[req.name] = {'pub': rospy.Publisher('/'+req.name+'/cmd_vel', Twist, queue_size=10), 't': Twist(), 'm': False}
        return TurtleCreateResponse(True, "Created %s" % req.name)
    except Exception as e: return TurtleCreateResponse(False, str(e))
def handle_command(req):
    if req.name not in turtles: turtles[req.name] = {'pub': rospy.Publisher('/'+req.name+'/cmd_vel', Twist, queue_size=10), 't': Twist(), 'm': False}
    turtles[req.name]['m'] = req.start
    if req.start: turtles[req.name]['t'].linear.x = req.linear_vel; turtles[req.name]['t'].angular.z = req.angular_vel
    else: turtles[req.name]['t'].linear.x = 0; turtles[req.name]['t'].angular.z = 0; turtles[req.name]['pub'].publish(turtles[req.name]['t'])
    return TurtleCommandResponse(True, "Command sent to %s" % req.name)
def server():
    rospy.init_node('turtle_command_server'); rospy.Service('/turtle_create', TurtleCreate, handle_create)
    rospy.Service('/turtle_command', TurtleCommand, handle_command); rate = rospy.Rate(20)
    while not rospy.is_shutdown():
        for d in turtles.values():
            if d['m']: d['pub'].publish(d['t'])
        rate.sleep()
if __name__ == "__main__": server()
EOF

                            data: [30, 25, 10, 15, 20],
                            backgroundColor: [
                                '#0d9488', // Teal
                                '#4f46e5', // Indigo
                                '#d97706', // Amber
                                '#ec4899', // Pink
                                '#44403c'  // Stone dark
                            ],
                            borderWidth: 2,
                            borderColor: '#ffffff',
                            hoverOffset: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false, // CRITICAL for chart-container sizing
                        plugins: {
                            legend: { position: 'bottom', labels: { boxWidth: 12, padding: 15, font: {family: "'Segoe UI', sans-serif"} } },
                            tooltip: { callbacks: { label: function(context) { return context.label + ': ~' + context.parsed + '% 代码量'; } } }
                        },
                        cutout: '65%'
                    }
                });
            },

            switchCode(module, tabId) {
                const codeBlock = document.getElementById(module === 'topic' ? 'code-display' : 'code-display-srv');
                const tabs = document.querySelectorAll(module === 'topic' ? '.code-tab' : '.code-tab-srv');
                
                // Update text
                if(codeSnippets[module] && codeSnippets[module][tabId]) {
                    codeBlock.textContent = codeSnippets[module][tabId];
                }

                // Update tab styles
                tabs.forEach(tab => {
                    if (tab.innerText.toLowerCase().includes(tabId.substring(0,3))) {
                        tab.classList.remove('text-stone-400', 'hover:text-white');
                        tab.classList.add('bg-stone-600', 'text-white');
                    } else {
                        tab.classList.add('text-stone-400', 'hover:text-white');
                        tab.classList.remove('bg-stone-600', 'text-white');
                    }
                });
            }
        };

        // Initialize App on load
        document.addEventListener('DOMContentLoaded', () => app.init());

    </script>
</body>
</html>
